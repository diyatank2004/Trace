name: CI/CD - Trace

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/trace-backend
  FRONTEND_IMAGE: ${{ github.repository }}/trace-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Backend Metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./trace-backend
          file: ./trace-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Frontend Metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./trace-frontend
          file: ./trace-frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2

    needs:
      - build-backend
      - build-frontend

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}

          script: |
            set -e

            cd ${{ secrets.DEPLOY_PROJECT_DIR }}

            echo "===== Updating Repository ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== Login to GHCR ====="
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "===== Pull Latest Images ====="
            docker compose pull

            echo "===== Stop Old Containers ====="
            docker compose down

            echo "===== Start New Containers ====="
            docker compose up -d --force-recreate --remove-orphans

            echo "===== Remove Old Images ====="
            docker image prune -af

            echo "===== Running Containers ====="
            docker ps

            echo "===== Deployment Successful ====="
